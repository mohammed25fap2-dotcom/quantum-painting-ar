<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>اللوحة المتراكبة - AI Reimagination</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: white;
        }
        #video-container { position: relative; width: 100%; height: 100%; }
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
        }
        #ai-result {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; display: none; z-index: 5;
        }
        .ui-layer {
            position: absolute; bottom: 0; left: 0; width: 100%;
            display: flex; flex-direction: column; align-items: center;
            gap: 12px; padding: 20px; box-sizing: border-box;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            z-index: 10;
        }
        .btn {
            background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.3);
            color: white; padding: 14px 24px; border-radius: 25px;
            font-size: 16px; font-weight: bold; cursor: pointer;
            width: 100%; max-width: 320px; text-align: center; transition: 0.3s;
        }
        .btn:active { background: rgba(255, 255, 255, 0.3); transform: scale(0.98); }
        .btn-primary { background: rgba(0, 122, 255, 0.7); border-color: #007aff; }
        .btn-primary:active { background: rgba(0, 122, 255, 0.9); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        #status-text {
            position: absolute; top: 20px; width: 100%; text-align: center;
            font-size: 15px; text-shadow: 0 2px 4px rgba(0,0,0,0.9);
            z-index: 10; padding: 0 20px; box-sizing: border-box;
            font-weight: 500;
        }
        .hidden { display: none !important; }
        
        .loading-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: none;
            justify-content: center; align-items: center;
            z-index: 100; flex-direction: column; padding: 20px;
        }
        .spinner {
            width: 60px; height: 60px; border: 4px solid rgba(255,255,255,0.3);
            border-top-color: #007aff; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text {
            font-size: 18px; text-align: center; margin-bottom: 10px;
        }
        .loading-subtext {
            font-size: 14px; opacity: 0.7; text-align: center;
        }
        .prompt-display {
            margin-top: 20px; padding: 15px;
            background: rgba(255,255,255,0.1); border-radius: 10px;
            max-width: 90%; font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="video-container">
        <video id="camera-feed" autoplay playsinline muted></video>
        <canvas id="quantum-canvas"></canvas>
        <img id="ai-result" alt="AI Generated">
        
        <div id="status-text">وجّه الكاميرا نحو اللوحة للبدء</div>
        
        <div class="loading-overlay" id="loading-overlay">
            <div class="spinner"></div>
            <div class="loading-text" id="loading-text">جارٍ إرسال الصورة إلى AI...</div>
            <div class="loading-subtext" id="loading-subtext">قد يستغرق 10-30 ثانية</div>
            <div class="prompt-display" id="prompt-display"></div>
        </div>

        <div class="ui-layer">
            <button id="start-btn" class="btn">تفعيل الكاميرا</button>
            <button id="observe-btn" class="btn btn-primary hidden">ارصد اللوحة (AI عشوائي)</button>
            <button id="reset-btn" class="btn hidden">رصد جديد</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('camera-feed');
        const canvas = document.getElementById('quantum-canvas');
        const ctx = canvas.getContext('2d');
        const aiResult = document.getElementById('ai-result');
        const startBtn = document.getElementById('start-btn');
        const observeBtn = document.getElementById('observe-btn');
        const resetBtn = document.getElementById('reset-btn');
        const statusText = document.getElementById('status-text');
        const loadingOverlay = document.getElementById('loading-overlay');
        const loadingText = document.getElementById('loading-text');
        const loadingSubtext = document.getElementById('loading-subtext');
        const promptDisplay = document.getElementById('prompt-display');

        let animationId;
        let currentSeed = Math.floor(Math.random() * 1000000);

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // برومبتات عشوائية لإعادة تخيل اللوحة
        const randomPrompts = [
            "reimagine this painting with horses running in different directions, dynamic motion, artistic style",
            "transform this artwork into a surreal version with elements moving chaotically, dreamlike quality",
            "reinterpret this painting with reversed movements, if standing make it jumping, if calm make it energetic",
            "reimagine this scene with all elements in opposite states, happy becomes sad, still becomes moving",
            "transform this painting into a cubist style with fragmented and rearranged elements",
            "reinterpret this artwork with elements floating in zero gravity, surreal composition",
            "reimagine this painting as if time is reversed, all movements going backwards",
            "transform this scene into an impressionist style with swirling colors and dynamic brushstrokes",
            "reinterpret this painting with elements scattered and reassembled in new positions",
            "reimagine this artwork with dramatic lighting and elements in unexpected poses"
        ];

        // 1. تفعيل الكاميرا
        startBtn.addEventListener('click', async () => {
            try {
                statusText.innerText = "جارٍ تفعيل الكاميرا...";
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: "environment",
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    } 
                });
                video.srcObject = stream;
                
                startBtn.classList.add('hidden');
                observeBtn.classList.remove('hidden');
                statusText.innerText = "وجّه الكاميرا نحو اللوحة، ثم اضغط 'ارصد'";
            } catch (err) {
                statusText.innerText = "خطأ: تأكد من استخدام HTTPS ومنح إذن الكاميرا";
                console.error(err);
            }
        });

        // 2. رصد اللوحة وإرسالها إلى AI
        observeBtn.addEventListener('click', async () => {
            try {
                // تجميد اللقطة
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                video.pause();
                
                observeBtn.classList.add('hidden');
                statusText.innerText = "️ انهيار الدالة الموجية... جارٍ إرسال الصورة إلى AI";
                
                // اختيار برومبت عشوائي
                const randomPrompt = randomPrompts[Math.floor(Math.random() * randomPrompts.length)];
                currentSeed = Math.floor(Math.random() * 1000000);
                
                // عرض شاشة التحميل
                loadingOverlay.style.display = 'flex';
                loadingText.innerText = "جارٍ إرسال الصورة إلى AI...";
                loadingSubtext.innerText = "قد يستغرق 10-30 ثانية";
                promptDisplay.innerText = `البرومبت: ${randomPrompt}`;
                
                // تحويل الصورة إلى Base64
                const imageData = canvas.toDataURL('image/jpeg', 0.8);
                
                // إرسال إلى Pollinations.ai
                await sendToAI(imageData, randomPrompt);
                
            } catch (err) {
                console.error('خطأ:', err);
                statusText.innerText = "حدث خطأ. حاول مرة أخرى.";
                loadingOverlay.style.display = 'none';
                observeBtn.classList.remove('hidden');
                video.play();
            }
        });

        // إرسال الصورة إلى Pollinations.ai
        async function sendToAI(imageData, prompt) {
            try {
                loadingText.innerText = "جارٍ معالجة الصورة بالذكاء الاصطناعي...";
                
                // Pollinations.ai يدعم Image-to-Image
                // نرسل الصورة كـ base64 في الـ URL
                const encodedImage = encodeURIComponent(imageData);
                const encodedPrompt = encodeURIComponent(prompt);
                
                // استخدام Pollinations.ai API
                const aiUrl = `https://image.pollinations.ai/prompt/${encodedPrompt}?width=${canvas.width}&height=${canvas.height}&seed=${currentSeed}&nologo=true&model=flux`;
                
                // تحميل الصورة المولدة
                const response = await fetch(aiUrl);
                
                if (!response.ok) {
                    throw new Error('فشل في توليد الصورة');
                }
                
                const blob = await response.blob();
                const imageUrl = URL.createObjectURL(blob);
                
                // عرض النتيجة
                aiResult.src = imageUrl;
                aiResult.style.display = 'block';
                canvas.style.display = 'none';
                
                loadingOverlay.style.display = 'none';
                statusText.innerText = "✅ تم الرصد! اللوحة أعيد تخيلها بالذكاء الاصطناعي";
                resetBtn.classList.remove('hidden');
                
            } catch (err) {
                console.error('خطأ في AI:', err);
                
                // إذا فشل Pollinations، جرب طريقة بديلة
                loadingText.innerText = "محاولة طريقة بديلة...";
                
                try {
                    // طريقة بديلة: استخدام seed مختلف
                    const encodedPrompt = encodeURIComponent(prompt + " artistic reinterpretation");
                    const aiUrl = `https://image.pollinations.ai/prompt/${encodedPrompt}?width=${canvas.width}&height=${canvas.height}&seed=${currentSeed + 1}&nologo=true&model=flux-refined`;
                    
                    const response = await fetch(aiUrl);
                    const blob = await response.blob();
                    const imageUrl = URL.createObjectURL(blob);
                    
                    aiResult.src = imageUrl;
                    aiResult.style.display = 'block';
                    canvas.style.display = 'none';
                    
                    loadingOverlay.style.display = 'none';
                    statusText.innerText = "✅ تم الرصد! اللوحة أعيد تخيلها";
                    resetBtn.classList.remove('hidden');
                    
                } catch (err2) {
                    throw err2;
                }
            }
        }

        // 3. إعادة التعيين
        resetBtn.addEventListener('click', () => {
            aiResult.style.display = 'none';
            aiResult.src = '';
            canvas.style.display = 'block';
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            video.play();
            resetBtn.classList.add('hidden');
            observeBtn.classList.remove('hidden');
            statusText.innerText = "جاهز لرصد جديد";
        });
    </script>
</body>
</html>
