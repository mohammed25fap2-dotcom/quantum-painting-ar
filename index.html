<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>اللوحة المتراكبة - إعادة التشكيل الكمي</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: white;
        }
        #video-container { position: relative; width: 100%; height: 100%; }
        video { 
            width: 100%; height: 100%; object-fit: cover;
        }
        canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
        }
        .ui-layer {
            position: absolute; bottom: 0; left: 0; width: 100%;
            display: flex; flex-direction: column; align-items: center;
            gap: 12px; padding: 20px; box-sizing: border-box;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            z-index: 10;
        }
        .btn {
            background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.3);
            color: white; padding: 14px 24px; border-radius: 25px;
            font-size: 16px; font-weight: bold; cursor: pointer;
            width: 100%; max-width: 320px; text-align: center; transition: 0.3s;
        }
        .btn:active { background: rgba(255, 255, 255, 0.3); transform: scale(0.98); }
        .btn-primary { background: rgba(0, 122, 255, 0.7); border-color: #007aff; }
        .btn-primary:active { background: rgba(0, 122, 255, 0.9); }
        
        #status-text {
            position: absolute; top: 20px; width: 100%; text-align: center;
            font-size: 15px; text-shadow: 0 2px 4px rgba(0,0,0,0.9);
            z-index: 10; padding: 0 20px; box-sizing: border-box;
            font-weight: 500;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="video-container">
        <video id="camera-feed" autoplay playsinline muted></video>
        <canvas id="quantum-canvas"></canvas>
        
        <div id="status-text">وجّه الكاميرا نحو اللوحة للبدء</div>

        <div class="ui-layer">
            <button id="start-btn" class="btn">تفعيل الكاميرا</button>
            <button id="observe-btn" class="btn btn-primary hidden">ارصد اللوحة (تغيير عشوائي)</button>
            <button id="reset-btn" class="btn hidden">رصد جديد</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('camera-feed');
        const canvas = document.getElementById('quantum-canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const observeBtn = document.getElementById('observe-btn');
        const resetBtn = document.getElementById('reset-btn');
        const statusText = document.getElementById('status-text');

        let animationId;
        let originalImageData = null;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 1. تفعيل الكاميرا
        startBtn.addEventListener('click', async () => {
            try {
                statusText.innerText = "جارٍ تفعيل الكاميرا...";
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: "environment",
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    } 
                });
                video.srcObject = stream;
                
                startBtn.classList.add('hidden');
                observeBtn.classList.remove('hidden');
                statusText.innerText = "وجّه الكاميرا نحو اللوحة، ثم اضغط 'ارصد'";
            } catch (err) {
                statusText.innerText = "خطأ: تأكد من استخدام HTTPS ومنح إذن الكاميرا";
                console.error(err);
            }
        });

        // 2. رصد اللوحة - اختيار عشوائي بين تأثيرين
        observeBtn.addEventListener('click', () => {
            try {
                // تجميد اللقطة
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                video.pause();
                
                // حفظ البيانات الأصلية
                originalImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                
                observeBtn.classList.add('hidden');
                statusText.innerText = "⚛️ انهيار الدالة الموجية... جارٍ إعادة التشكيل";
                
                // اختيار عشوائي بين تأثيرين فقط:
                // 1. التشويه الكمي (الجميل)
                // 2. إعادة التشكيل العنصري (إعادة ترتيب العناصر)
                const effects = ['quantumDistortion', 'elementReassembly'];
                const randomEffect = effects[Math.floor(Math.random() * effects.length)];
                
                setTimeout(() => {
                    applyTransformation(randomEffect);
                }, 100);
                
            } catch (err) {
                console.error('خطأ في الرصد:', err);
                statusText.innerText = "حدث خطأ. حاول مرة أخرى.";
                observeBtn.classList.remove('hidden');
                video.play();
            }
        });

        // تطبيق التحول
        function applyTransformation(effectType) {
            try {
                if (effectType === 'quantumDistortion') {
                    applyQuantumDistortion();
                } else if (effectType === 'elementReassembly') {
                    applyElementReassembly();
                }
            } catch (err) {
                console.error('خطأ في تطبيق التأثير:', err);
                statusText.innerText = "خطأ في التطبيق. حاول رصد جديد.";
                resetBtn.classList.remove('hidden');
            }
        }

        // تأثير 1: التشويه الكمي (الجميل الذي أعجبك)
        function applyQuantumDistortion() {
            const width = canvas.width;
            const height = canvas.height;
            const imageData = ctx.getImageData(0, 0, width, height);
            const data = imageData.data;
            
            let frame = 0;
            const maxFrames = 60;
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = width;
            tempCanvas.height = height;
            const tempCtx = tempCanvas.getContext('2d');
            
            function animate() {
                if (frame >= maxFrames) {
                    // إضافة تأثير لوني نهائي
                    ctx.globalCompositeOperation = 'overlay';
                    const gradient = ctx.createRadialGradient(
                        width/2, height/2, 0,
                        width/2, height/2, width
                    );
                    gradient.addColorStop(0, `hsla(${Math.random() * 360}, 70%, 50%, 0.3)`);
                    gradient.addColorStop(1, 'transparent');
                    ctx.fillStyle = gradient;
                    ctx.fillRect(0, 0, width, height);
                    
                    statusText.innerText = "✅ تم الرصد! تشويه كمي";
                    resetBtn.classList.remove('hidden');
                    return;
                }
                
                const progress = frame / maxFrames;
                const intensity = Math.sin(progress * Math.PI) * 30;
                const tempData = new Uint8ClampedArray(data);
                
                for (let y = 0; y < height; y += 2) {
                    for (let x = 0; x < width; x++) {
                        const offsetX = Math.sin((y + frame * 5) * 0.01) * intensity;
                        const offsetY = Math.cos((x + frame * 5) * 0.01) * intensity * 0.5;
                        const srcX = Math.floor(x + offsetX);
                        const srcY = Math.floor(y + offsetY);
                        
                        if (srcX >= 0 && srcX < width && srcY >= 0 && srcY < height) {
                            const srcIdx = (srcY * width + srcX) * 4;
                            const dstIdx = (y * width + x) * 4;
                            
                            data[dstIdx] = tempData[srcIdx];
                            data[dstIdx + 1] = tempData[srcIdx + 1];
                            data[dstIdx + 2] = tempData[srcIdx + 2];
                        }
                    }
                }
                
                ctx.putImageData(imageData, 0, 0);
                frame++;
                requestAnimationFrame(animate);
            }
            animate();
        }

        // تأثير 2: إعادة التشكيل العنصري (إعادة ترتيب العناصر)
        function applyElementReassembly() {
            const width = canvas.width;
            const height = canvas.height;
            
            // تقسيم الصورة إلى عناصر/كتل كبيرة
            const numElements = 6 + Math.floor(Math.random() * 4); // 6-9 عناصر
            const elements = [];
            
            // إنشاء عناصر بأحجام مختلفة
            for (let i = 0; i < numElements; i++) {
                const elemWidth = width / (3 + Math.floor(Math.random() * 2)); // عرض متغير
                const elemHeight = height / (2 + Math.floor(Math.random() * 2)); // ارتفاع متغير
                
                elements.push({
                    x: Math.random() * (width - elemWidth),
                    y: Math.random() * (height - elemHeight),
                    width: elemWidth,
                    height: elemHeight,
                    originalX: 0,
                    originalY: 0
                });
            }
            
            // ترتيب العناصر في مواقعها الأصلية (شبكة)
            let index = 0;
            const cols = Math.ceil(Math.sqrt(numElements));
            const rows = Math.ceil(numElements / cols);
            const cellWidth = width / cols;
            const cellHeight = height / rows;
            
            for (let row = 0; row < rows && index < numElements; row++) {
                for (let col = 0; col < cols && index < numElements; col++) {
                    elements[index].originalX = col * cellWidth;
                    elements[index].originalY = row * cellHeight;
                    elements[index].newX = elements[index].originalX;
                    elements[index].newY = elements[index].originalY;
                    index++;
                }
            }
            
            // خلط العناصر عشوائياً (إعادة ترتيب)
            elements.sort(() => Math.random() - 0.5);
            
            // تعيين مواقع جديدة
            for (let i = 0; i < elements.length; i++) {
                const row = Math.floor(i / cols);
                const col = i % cols;
                elements[i].targetX = col * cellWidth + (Math.random() - 0.5) * cellWidth * 0.3;
                elements[i].targetY = row * cellHeight + (Math.random() - 0.5) * cellHeight * 0.3;
                elements[i].scale = 0.8 + Math.random() * 0.4; // تغيير حجم طفيف
                elements[i].rotation = (Math.random() - 0.5) * 0.3; // دوران طفيف
            }
            
            // إنشاء كانفاس مؤقت للرسم
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = width;
            tempCanvas.height = height;
            const tempCtx = tempCanvas.getContext('2d');
            
            // ملء الخلفية بلون متوسط من الصورة
            tempCtx.fillStyle = '#8B8B7B';
            tempCtx.fillRect(0, 0, width, height);
            
            // رسم العناصر في مواقعها الجديدة
            elements.forEach((elem, i) => {
                // قص العنصر من الصورة الأصلية
                const elemCanvas = document.createElement('canvas');
                elemCanvas.width = elem.width;
                elemCanvas.height = elem.height;
                const elemCtx = elemCanvas.getContext('2d');
                
                elemCtx.drawImage(
                    canvas,
                    elem.x, elem.y, elem.width, elem.height,
                    0, 0, elem.width, elem.height
                );
                
                // رسم العنصر في الموقع الجديد مع تحويلات
                tempCtx.save();
                tempCtx.translate(
                    elem.targetX + elem.width / 2,
                    elem.targetY + elem.height / 2
                );
                tempCtx.rotate(elem.rotation);
                tempCtx.scale(elem.scale, elem.scale);
                tempCtx.drawImage(
                    elemCanvas,
                    -elem.width / 2,
                    -elem.height / 2
                );
                tempCtx.restore();
            });
            
            // إضافة تأثير انتقالي
            ctx.globalAlpha = 0;
            let alpha = 0;
            
            function fadeIn() {
                if (alpha >= 1) {
                    ctx.globalAlpha = 1;
                    statusText.innerText = "✅ تم الرصد! إعادة تشكيل العناصر";
                    resetBtn.classList.remove('hidden');
                    return;
                }
                
                alpha += 0.05;
                ctx.globalAlpha = alpha;
                ctx.drawImage(tempCanvas, 0, 0);
                requestAnimationFrame(fadeIn);
            }
            
            fadeIn();
        }

        // 3. إعادة التعيين
        resetBtn.addEventListener('click', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.globalCompositeOperation = 'source-over';
            ctx.globalAlpha = 1;
            video.play();
            resetBtn.classList.add('hidden');
            observeBtn.classList.remove('hidden');
            statusText.innerText = "جاهز لرصد جديد. التغيير سيكون عشوائياً!";
        });
    </script>
</body>
</html>
