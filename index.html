<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>اللوحة المتراكبة - إعادة التشكيل الكمي</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: white;
        }
        #video-container { position: relative; width: 100%; height: 100%; }
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            /* تطبيق الفلتر الكمي على الكانفاس */
            filter: url(#quantum-filter);
        }
        .ui-layer {
            position: absolute; bottom: 0; left: 0; width: 100%;
            display: flex; flex-direction: column; align-items: center;
            gap: 12px; padding: 20px; box-sizing: border-box;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            z-index: 10;
        }
        .btn {
            background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.3);
            color: white; padding: 14px 24px; border-radius: 25px;
            font-size: 16px; font-weight: bold; cursor: pointer;
            width: 100%; max-width: 320px; text-align: center; transition: 0.3s;
        }
        .btn:active { background: rgba(255, 255, 255, 0.3); transform: scale(0.98); }
        .btn-primary { background: rgba(0, 122, 255, 0.7); border-color: #007aff; }
        .btn-primary:active { background: rgba(0, 122, 255, 0.9); }
        
        #status-text {
            position: absolute; top: 20px; width: 100%; text-align: center;
            font-size: 15px; text-shadow: 0 2px 4px rgba(0,0,0,0.9);
            z-index: 10; padding: 0 20px; box-sizing: border-box;
            font-weight: 500;
        }
        .quantum-input {
            width: 100%; max-width: 320px; padding: 12px 16px;
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.4);
            background: rgba(0,0,0,0.6); color: white; font-size: 15px;
            text-align: center; outline: none;
        }
        .quantum-input::placeholder { color: rgba(255,255,255,0.6); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- تعريف الفلتر الكمي (SVG) -->
    <svg width="0" height="0" style="position:absolute;">
        <defs>
            <filter id="quantum-filter">
                <feTurbulence type="fractalNoise" baseFrequency="0.01" numOctaves="3" result="noise" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="0" xChannelSelector="R" yChannelSelector="G" />
            </filter>
        </defs>
    </svg>

    <div id="video-container">
        <video id="camera-feed" autoplay playsinline muted></video>
        <canvas id="quantum-canvas"></canvas>
        
        <div id="status-text">وجّه الكاميرا نحو اللوحة للبدء</div>

        <div class="ui-layer">
            <button id="start-btn" class="btn">تفعيل الكاميرا</button>
            
            <input type="text" id="quantum-prompt" class="quantum-input hidden" 
                   placeholder="كيف تتغير اللوحة؟ (مثال: اجعل الحصان يركض)">
            
            <button id="observe-btn" class="btn btn-primary hidden">ارصد اللوحة (انهيار كمي)</button>
            <button id="reset-btn" class="btn hidden">رصد لوحة جديدة</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('camera-feed');
        const canvas = document.getElementById('quantum-canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const observeBtn = document.getElementById('observe-btn');
        const resetBtn = document.getElementById('reset-btn');
        const statusText = document.getElementById('status-text');
        const promptInput = document.getElementById('quantum-prompt');
        
        const turbulence = document.querySelector('#quantum-filter feTurbulence');
        const displacement = document.querySelector('#quantum-filter feDisplacementMap');

        let animationId;
        let startTime;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 1. تفعيل الكاميرا (متوافق مع iPhone)
        startBtn.addEventListener('click', async () => {
            try {
                statusText.innerText = "جارٍ طلب إذن الكاميرا...";
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } 
                });
                video.srcObject = stream;
                
                startBtn.classList.add('hidden');
                observeBtn.classList.remove('hidden');
                promptInput.classList.remove('hidden');
                statusText.innerText = "وجّه الكاميرا نحو اللوحة، واكتب القصة الجديدة";
            } catch (err) {
                statusText.innerText = "تعذر الوصول للكاميرا. تأكد من استخدام HTTPS.";
            }
        });

        // 2. رصد اللوحة وتطبيق التشوه الكمي
        observeBtn.addEventListener('click', () => {
            const userStory = promptInput.value.trim() || "تغيير الحالة الكمية";
            
            // تجميد اللقطة الحالية من الكاميرا على الكانفاس
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            video.pause(); // إيقاف الفيديو
            
            observeBtn.classList.add('hidden');
            promptInput.classList.add('hidden');
            statusText.innerText = `⚛️ انهيار الدالة الموجية... جارٍ إعادة تشكيل: "${userStory}"`;
            
            // بدء أنيميشن التشوه الكمي
            startTime = null;
            animationId = requestAnimationFrame(animateQuantumCollapse);
        });

        // دالة الأنيميشن (تفكك ثم إعادة تشكيل)
        function animateQuantumCollapse(timestamp) {
            if (!startTime) startTime = timestamp;
            const progress = (timestamp - startTime) / 2500; // 2.5 ثانية
            
            if (progress < 0.4) {
                // المرحلة الأولى: التفكك والذوبان
                const intensity = progress / 0.4;
                displacement.setAttribute('scale', intensity * 120);
                turbulence.setAttribute('baseFrequency', 0.01 + (intensity * 0.08));
            } else if (progress < 0.8) {
                // المرحلة الثانية: الفوضى الكمية
                const intensity = (progress - 0.4) / 0.4;
                displacement.setAttribute('scale', 120 - (intensity * 40));
                turbulence.setAttribute('baseFrequency', 0.09 - (intensity * 0.04));
            } else {
                // المرحلة الثالثة: الاستقرار في الحالة الجديدة
                const intensity = (progress - 0.8) / 0.2;
                displacement.setAttribute('scale', 80 * (1 - intensity));
                turbulence.setAttribute('baseFrequency', 0.05 * (1 - intensity) + 0.01);
            }
            
            if (progress < 1) {
                animationId = requestAnimationFrame(animateQuantumCollapse);
            } else {
                // انتهاء التأثير
                displacement.setAttribute('scale', 0);
                statusText.innerText = `✅ تم الرصد: اللوحة الآن في حالة "${promptInput.value || 'جديدة'}"`;
                resetBtn.classList.remove('hidden');
            }
        }

        // 3. إعادة التعيين
        resetBtn.addEventListener('click', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            video.play();
            resetBtn.classList.add('hidden');
            observeBtn.classList.remove('hidden');
            promptInput.classList.remove('hidden');
            promptInput.value = '';
            statusText.innerText = "جاهز لرصد جديد. وجّه الكاميرا واكتب القصة";
        });
    </script>
</body>
</html>
